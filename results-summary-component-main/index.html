<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="wrapper">
    <main>
      <div id="result">
        <h2>Your Result</h2>
        <p id="score">
          <span class="bigger">76</span>
          of 100
        </p>

        <h3>Great</h3>
        <p>
          You scored higher than 65% of the people who have taken these tests.
        </p>        
      </div>
      <div id="summary">
        <h2>Summary</h2>

        <div class="reaction">
          <img src="./assets/images/icon-reaction.svg" alt="icone reaction">
          <h3>Reaction</h3>
          <p>
            <strong>80</strong> / 100
          </p>
        </div>
        <div class="memory">
          <img src="./assets/images/icon-memory.svg" alt="icone memory">
          <h3>Memory</h3>
          <p>
            <strong>92</strong> / 100
          </p>
        </div>
        <div class="verbal">
          <img src="./assets/images/icon-verbal.svg" alt="icone verbal">
          <h3>Verbal</h3>
          <p>
            <strong>61</strong> / 100
          </p>
        </div>
        <div class="visual">
          <img src="./assets/images/icon-visual.svg" alt="icon visual">
          <h3>Visual</h3>
          <p>
            <strong>72</strong> / 100
          </p>
        </div>
        

        <a href="#" class="button">Continue</a>

      </div>
    </main>

  </div>
  
  
  
  

</body>
</html>
